name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.5'
    steps:
      - uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
      - name: Install mold linker
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          # mold accelerates dev builds; coverage uses lld for llvm-tools compatibility.
          sudo apt-get update \
            && sudo apt-get install --yes --no-install-recommends clang lld mold
      - name: Format
        run: make check-fmt
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@2df9e28eb87988518ef3880c34edad45d65b1668
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Setup uv
        uses: astral-sh/setup-uv@9225f843d7a9f80a757cf25ef48901fda69ba4bc
      - name: Spelling
        run: make spelling
      - name: Install test runner
        env:
          RUSTFLAGS: ""
        run: cargo binstall --no-confirm cargo-nextest
      # Dependency audits report advisories against the whole lockfile, so a
      # newly published advisory would fail every Dependabot PR regardless of
      # content and deadlock auto-merge. The scheduled audit workflow covers
      # Dependabot merges instead.
      - name: Install cargo-audit
        if: github.actor != 'dependabot[bot]'
        env:
          RUSTFLAGS: ""
        run: cargo binstall --no-confirm cargo-audit
      - name: Setup Python for audit manifest extraction
        if: github.actor != 'dependabot[bot]'
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Cache Whitaker installer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        env:
          RUSTFLAGS: ""
        run: |
          set -euo pipefail
          if command -v whitaker-installer >/dev/null 2>&1; then
            echo "whitaker-installer already present; skipping cargo binstall"
          else
            cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
          fi
          # --cranelift provisions rustc-codegen-cranelift on Whitaker's pinned
          # toolchain; this project builds with the Cranelift debug backend.

          whitaker-installer --cranelift
      - name: Audit dependencies
        if: github.actor != 'dependabot[bot]'
        run: make audit
      - name: Lint
        run: make lint
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Log coverage linker configuration
        run: |
          echo "Coverage linker: clang"
          echo "Coverage RUSTFLAGS: -C link-arg=-fuse-ld=lld"
          echo "Coverage CFLAGS: -fuse-ld=lld"
          echo "Coverage LDFLAGS: -fuse-ld=lld"
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        env:
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER: clang
          RUSTFLAGS: -C link-arg=-fuse-ld=lld
          CFLAGS: -fuse-ld=lld
          LDFLAGS: -fuse-ld=lld
        with:
          output-path: lcov.info
          format: lcov
          with-ratchet: 'true'
      # The `mode: check` step is deliberately not wired in yet: CodeScene
      # project 81924 has no coverage-gates configuration, so
      # `cs-coverage check` would fail every run with "HTTP call
      # succeeded, but the received project-config isn't valid. Lacks the
      # gates configuration." — a CodeScene-side per-project setting, not
      # a CI defect (ddlint#287 and chutoro#156 hit the byte-identical
      # error). `coverage-main.yml` uploads main-branch coverage instead.
      # Add the check step in a fast-follow PR once the gate is confirmed
      # to resolve, or once CodeScene confirms the project's coverage
      # gate is enabled.
